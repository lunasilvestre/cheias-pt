<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cheias.pt — Layer Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Side panels wrapper */
    #side-panels {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Layer panel */
    #layers {
      background: rgba(12, 12, 20, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 190px;
      font-size: 13px;
    }
    #layers h3, #camera h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: #666; margin-bottom: 8px;
    }
    .lyr {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0; cursor: pointer;
    }
    .lyr input { accent-color: #3498db; cursor: pointer; }
    .lyr label { cursor: pointer; user-select: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* Camera panel */
    #camera {
      background: rgba(12, 12, 20, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .cam-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .cam-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: #ccc;
      font-size: 11px;
      font-family: inherit;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .cam-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* Timeline bar */
    #timeline {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(12, 12, 20, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 20px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    #play-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; color: #e0e0e0; font-size: 16px;
      width: 34px; height: 34px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { border-color: rgba(255,255,255,0.4); }
    #date-slider {
      flex: 1; height: 4px; accent-color: #3498db;
      cursor: pointer;
    }
    #date-label {
      font-size: 13px; font-variant-numeric: tabular-nums;
      min-width: 110px; text-align: right; color: #ccc;
    }
    #storm-markers {
      position: absolute; bottom: 54px; left: 20px; right: 20px;
      height: 16px; z-index: 10; pointer-events: none;
    }
    .storm-mark {
      position: absolute; top: 0;
      font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
      color: #888; white-space: nowrap;
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 4px;
    }

    /* Loading */
    #loading {
      position: absolute; inset: 0; z-index: 100;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #666;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="loading">Loading...</div>
<div id="map"></div>

<div id="side-panels">
  <div id="layers">
    <h3>Layers</h3>
    <div class="lyr"><input type="checkbox" id="t-sm" checked /><span class="dot" style="background:#2e86c1"></span><label for="t-sm">Soil moisture</label></div>
    <div class="lyr"><input type="checkbox" id="t-pr" /><span class="dot" style="background:#27ae60"></span><label for="t-pr">Precipitation</label></div>
    <div class="lyr"><input type="checkbox" id="t-mslp" /><span class="dot" style="background:#aaa"></span><label for="t-mslp">MSLP contours</label></div>
    <div class="lyr"><input type="checkbox" id="t-lh" /><span class="dot" style="background:#e74c3c"></span><label for="t-lh">L/H markers</label></div>
    <div class="lyr"><input type="checkbox" id="t-rivers" /><span class="dot" style="background:#50a0f0"></span><label for="t-rivers">Rivers</label></div>
    <div class="lyr"><input type="checkbox" id="t-discharge" /><span class="dot" style="background:#2ecc71"></span><label for="t-discharge">Discharge stations</label></div>
    <div class="lyr"><input type="checkbox" id="t-lightning" /><span class="dot" style="background:#f1c40f"></span><label for="t-lightning">Lightning</label></div>
    <div class="lyr"><input type="checkbox" id="t-arcs" checked /><span class="dot" style="background:#3498db"></span><label for="t-arcs">Storm arcs</label></div>
    <div class="lyr"><input type="checkbox" id="t-wind" /><span class="dot" style="background:#7fb3d8"></span><label for="t-wind">Wind barbs</label></div>
  </div>

  <div id="camera">
    <h3>Camera</h3>
    <div class="cam-btns">
      <button type="button" class="cam-btn" data-center="-20,42" data-zoom="4">Atlantic</button>
      <button type="button" class="cam-btn" data-center="-5,39.5" data-zoom="5.5">Iberia</button>
      <button type="button" class="cam-btn" data-center="-8,39.5" data-zoom="6.5">Portugal</button>
    </div>
  </div>
</div>

<div id="storm-markers"></div>

<div id="timeline">
  <button id="play-btn" title="Play/Pause">&#9654;</button>
  <input type="range" id="date-slider" min="0" max="76" value="0" />
  <span id="date-label"></span>
</div>

<script>
// ============================================================
// cheias.pt — Layer Viewer (v2.1)
// Smooth crossfades, animated toggles, camera presets
// ============================================================

const { MapboxOverlay, ArcLayer, ScatterplotLayer } = deck;

// ---- Date array: 77 days from 2025-12-01 ----
const dates = [];
const startDate = new Date('2025-12-01');
for (let i = 0; i < 77; i++) {
  const d = new Date(startDate);
  d.setDate(startDate.getDate() + i);
  dates.push(d.toISOString().slice(0, 10));
}

// Storm date indices for timeline markers
const storms = [
  { name: 'Kristin', date: '2026-01-27', color: '#3498db' },
  { name: 'Leonardo', date: '2026-02-05', color: '#e67e22' },
  { name: 'Marta', date: '2026-02-09', color: '#e74c3c' },
];

// Raster bounds: Portugal mainland
const PT_BOUNDS = [[-9.6, 42.2], [-6.1, 42.2], [-6.1, 36.9], [-9.6, 36.9]];

// ---- State ----
const vis = {
  sm: true, pr: false, mslp: false, lh: false,
  rivers: false, discharge: false, lightning: false,
  arcs: true, wind: false,
};
let playing = false;
let playTimer = null;
let mapInstance = null;
let deckOverlay = null;
let deckData = {};

// Crossfade state for raster double-buffering
const crossfade = {
  sm: { active: 'a', animId: null, lastDate: null },
  pr: { active: 'a', animId: null, lastDate: null },
};

// Animation tracking (keyed by "layerId:property")
const activeAnimations = {};

// deck.gl layer opacity (animated independently)
const deckOpacity = { arcs: 1.0, wind: 0.0 };
const deckAnimations = {};

// ---- Opacity targets per MapLibre layer: [property, maxOpacity] pairs ----
const LAYER_OPACITY = {
  'mslp-lines':        [['line-opacity', 0.6]],
  'mslp-labels':       [['text-opacity', 1.0]],
  'lh-labels':         [['text-opacity', 1.0]],
  'lh-pressure':       [['text-opacity', 1.0]],
  'river-lines':       [['line-opacity', 0.6]],
  'discharge-circles': [['circle-opacity', 0.7], ['circle-stroke-opacity', 0.4]],
  'discharge-labels':  [['text-opacity', 1.0]],
  'lightning-circles': [['circle-opacity', 0.7]],
};

// ---- Format date for display ----
function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// ---- Reusable opacity animation (requestAnimationFrame) ----
function animateOpacity(layerId, property, from, to, duration) {
  const key = layerId + ':' + property;
  if (activeAnimations[key]) {
    cancelAnimationFrame(activeAnimations[key]);
    delete activeAnimations[key];
  }
  if (Math.abs(from - to) < 0.005) {
    if (mapInstance.getLayer(layerId)) {
      mapInstance.setPaintProperty(layerId, property, to);
    }
    return;
  }
  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    const val = Math.max(0, from + (to - from) * t);
    if (mapInstance.getLayer(layerId)) {
      mapInstance.setPaintProperty(layerId, property, val);
    }
    if (t < 1) {
      activeAnimations[key] = requestAnimationFrame(tick);
    } else {
      delete activeAnimations[key];
    }
  }
  activeAnimations[key] = requestAnimationFrame(tick);
}

// ---- deck.gl opacity animation ----
function animateDeckOpacity(key, from, to, duration) {
  if (deckAnimations[key]) cancelAnimationFrame(deckAnimations[key]);
  if (Math.abs(from - to) < 0.005) {
    deckOpacity[key] = to;
    updateDeck();
    return;
  }
  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    deckOpacity[key] = from + (to - from) * t;
    updateDeck();
    if (t < 1) {
      deckAnimations[key] = requestAnimationFrame(tick);
    } else {
      delete deckAnimations[key];
    }
  }
  deckAnimations[key] = requestAnimationFrame(tick);
}

// ---- Raster frame crossfade (dual-source A/B swap) ----
function crossfadeFrame(type, date, duration) {
  const cf = crossfade[type];
  if (cf.lastDate === date) return;
  cf.lastDate = date;

  const prefix = type === 'sm' ? 'soil-moisture' : 'precipitation';
  const layerA = type + '-layer-a';
  const layerB = type + '-layer-b';
  const target = type === 'sm' ? 0.8 : 0.75;

  const isA = cf.active === 'a';
  const activeLayer = isA ? layerA : layerB;
  const inactiveLayer = isA ? layerB : layerA;
  const inactiveSource = prefix + '-' + (isA ? 'b' : 'a');

  // Cancel any conflicting animations (crossfade + toggle animations)
  if (cf.animId) {
    cancelAnimationFrame(cf.animId);
    cf.animId = null;
  }
  for (const lid of [layerA, layerB]) {
    const k = lid + ':raster-opacity';
    if (activeAnimations[k]) {
      cancelAnimationFrame(activeAnimations[k]);
      delete activeAnimations[k];
    }
  }
  // Snap to known state
  mapInstance.setPaintProperty(activeLayer, 'raster-opacity', target);
  mapInstance.setPaintProperty(inactiveLayer, 'raster-opacity', 0);

  // Load new frame into the inactive source
  if (mapInstance.getSource(inactiveSource)) {
    try {
      mapInstance.getSource(inactiveSource).updateImage({
        url: 'data/raster-frames/' + prefix + '/' + date + '.png',
      });
    } catch (_) { /* AbortError from rapid image swaps — expected */ }
  }

  // Animate the crossfade (values clamped to prevent negative opacity)
  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    mapInstance.setPaintProperty(activeLayer, 'raster-opacity', Math.max(0, target * (1 - t)));
    mapInstance.setPaintProperty(inactiveLayer, 'raster-opacity', Math.max(0, target * t));
    if (t < 1) {
      cf.animId = requestAnimationFrame(tick);
    } else {
      cf.animId = null;
    }
  }
  cf.animId = requestAnimationFrame(tick);

  // Flip active buffer
  cf.active = isA ? 'b' : 'a';
}

// ---- Data loading ----
async function loadGeoJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error('Failed to load ' + path + ': ' + r.status);
  return r.json();
}

async function loadVectorData() {
  const base = 'data/qgis/';
  const [mslp, lh, rivers, discharge, lightning, wind] = await Promise.all([
    loadGeoJSON(base + 'mslp-contours-v2.geojson'),
    loadGeoJSON(base + 'mslp-lh-markers.geojson'),
    loadGeoJSON(base + 'rivers-portugal.geojson'),
    loadGeoJSON(base + 'discharge-stations.geojson'),
    loadGeoJSON(base + 'lightning-kristin.geojson'),
    loadGeoJSON(base + 'wind-barbs-kristin.geojson'),
  ]);
  return { mslp, lh, rivers, discharge, lightning, wind };
}

// ---- Storm arc data (hardcoded approximate tracks) ----
const stormArcs = [
  { source: [-32, 34], target: [-8.5, 41.5], name: 'Kristin',  color: [52, 152, 219] },
  { source: [-30, 32], target: [-8, 39],     name: 'Leonardo', color: [230, 126, 34] },
  { source: [-28, 30], target: [-6, 38],     name: 'Marta',    color: [231, 76, 60] },
];

// ---- Build deck.gl layers ----
function buildDeckLayers() {
  const layers = [];

  if (deckOpacity.arcs > 0.01) {
    layers.push(new ArcLayer({
      id: 'storm-arcs',
      data: stormArcs,
      getSourcePosition: d => d.source,
      getTargetPosition: d => d.target,
      getSourceColor: d => [...d.color, 100],
      getTargetColor: d => [...d.color, 240],
      getWidth: 3,
      greatCircle: true,
      pickable: true,
      opacity: deckOpacity.arcs,
    }));
  }

  if (deckOpacity.wind > 0.01 && deckData.wind) {
    layers.push(new ScatterplotLayer({
      id: 'wind-barbs',
      data: deckData.wind.features,
      getPosition: d => d.geometry.coordinates,
      getRadius: d => 800 + d.properties.speed_ms * 150,
      getFillColor: d => {
        const s = d.properties.speed_ms;
        if (s > 25) return [255, 50, 50, 200];
        if (s > 15) return [255, 165, 0, 160];
        if (s > 8) return [255, 255, 100, 120];
        return [127, 179, 216, 80];
      },
      radiusMinPixels: 1,
      radiusMaxPixels: 5,
      pickable: false,
      opacity: deckOpacity.wind,
    }));
  }

  return layers;
}

function updateDeck() {
  if (deckOverlay) deckOverlay.setProps({ layers: buildDeckLayers() });
}

// ---- Add native MapLibre layers ----
// All layers start with visibility:'visible'; opacity controls show/hide
function addNativeLayers(map, data) {
  const firstDate = dates[0];

  // Soil moisture — dual sources for crossfade
  map.addSource('soil-moisture-a', {
    type: 'image',
    url: 'data/raster-frames/soil-moisture/' + firstDate + '.png',
    coordinates: PT_BOUNDS,
  });
  map.addSource('soil-moisture-b', {
    type: 'image',
    url: 'data/raster-frames/soil-moisture/' + firstDate + '.png',
    coordinates: PT_BOUNDS,
  });
  map.addLayer({ id: 'sm-layer-b', type: 'raster', source: 'soil-moisture-b',
    paint: { 'raster-opacity': 0 },
  });
  map.addLayer({ id: 'sm-layer-a', type: 'raster', source: 'soil-moisture-a',
    paint: { 'raster-opacity': 0.8 },
  });

  // Precipitation — dual sources for crossfade
  map.addSource('precipitation-a', {
    type: 'image',
    url: 'data/raster-frames/precipitation/' + firstDate + '.png',
    coordinates: PT_BOUNDS,
  });
  map.addSource('precipitation-b', {
    type: 'image',
    url: 'data/raster-frames/precipitation/' + firstDate + '.png',
    coordinates: PT_BOUNDS,
  });
  map.addLayer({ id: 'pr-layer-b', type: 'raster', source: 'precipitation-b',
    paint: { 'raster-opacity': 0 },
  });
  map.addLayer({ id: 'pr-layer-a', type: 'raster', source: 'precipitation-a',
    paint: { 'raster-opacity': 0 },
  });

  // MSLP contours
  map.addSource('mslp', { type: 'geojson', data: data.mslp });
  map.addLayer({ id: 'mslp-lines', type: 'line', source: 'mslp',
    paint: { 'line-color': '#ccc', 'line-width': 0.8, 'line-opacity': 0 },
  });
  map.addLayer({ id: 'mslp-labels', type: 'symbol', source: 'mslp',
    layout: {
      'symbol-placement': 'line',
      'text-field': ['concat', ['get', 'hPa'], ' hPa'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, -0.7],
      'text-max-angle': 30,
    },
    paint: {
      'text-color': '#ccc',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1.5,
      'text-opacity': 0,
    },
  });

  // L/H markers
  map.addSource('lh', { type: 'geojson', data: data.lh });
  map.addLayer({ id: 'lh-labels', type: 'symbol', source: 'lh',
    layout: {
      'text-field': ['get', 'type'],
      'text-size': 22,
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-allow-overlap': true,
    },
    paint: {
      'text-color': ['match', ['get', 'type'], 'L', '#e74c3c', 'H', '#3498db', '#fff'],
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 2,
      'text-opacity': 0,
    },
  });
  map.addLayer({ id: 'lh-pressure', type: 'symbol', source: 'lh',
    layout: {
      'text-field': ['concat', ['to-string', ['get', 'pressure_hpa']], ' hPa'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, 1.8],
      'text-allow-overlap': true,
    },
    paint: {
      'text-color': '#aaa',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1,
      'text-opacity': 0,
    },
  });

  // Rivers
  map.addSource('rivers', { type: 'geojson', data: data.rivers });
  map.addLayer({ id: 'river-lines', type: 'line', source: 'rivers',
    paint: { 'line-color': '#50a0f0', 'line-width': 2, 'line-opacity': 0 },
  });

  // Discharge stations
  map.addSource('discharge', { type: 'geojson', data: data.discharge });
  map.addLayer({ id: 'discharge-circles', type: 'circle', source: 'discharge',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'discharge_max'],
        0, 4, 500, 8, 2000, 14, 5000, 20],
      'circle-color': '#2ecc71',
      'circle-opacity': 0,
      'circle-stroke-color': '#fff',
      'circle-stroke-width': 1,
      'circle-stroke-opacity': 0,
    },
  });
  map.addLayer({ id: 'discharge-labels', type: 'symbol', source: 'discharge',
    layout: {
      'text-field': ['get', 'name'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, 1.5],
      'text-allow-overlap': false,
    },
    paint: {
      'text-color': '#ccc',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1,
      'text-opacity': 0,
    },
  });

  // Lightning
  map.addSource('lightning', { type: 'geojson', data: data.lightning });
  map.addLayer({ id: 'lightning-circles', type: 'circle', source: 'lightning',
    paint: {
      'circle-radius': 3,
      'circle-color': '#f1c40f',
      'circle-opacity': 0,
    },
  });
}

// ---- Layer visibility mapping ----
const LAYER_MAP = {
  sm:        ['sm-layer-a', 'sm-layer-b'],
  pr:        ['pr-layer-a', 'pr-layer-b'],
  mslp:      ['mslp-lines', 'mslp-labels'],
  lh:        ['lh-labels', 'lh-pressure'],
  rivers:    ['river-lines'],
  discharge: ['discharge-circles', 'discharge-labels'],
  lightning: ['lightning-circles'],
  // arcs + wind controlled via deck.gl
};

function syncVisibility() {
  for (const [key, layerIds] of Object.entries(LAYER_MAP)) {
    const on = vis[key];

    // Raster crossfade layers: only the active buffer gets target opacity
    if (key === 'sm' || key === 'pr') {
      const cf = crossfade[key];
      // Cancel any in-progress crossfade to avoid conflicting animations
      if (cf.animId) {
        cancelAnimationFrame(cf.animId);
        cf.animId = null;
      }
      const target = key === 'sm' ? 0.8 : 0.75;
      const aLayer = layerIds[0];
      const bLayer = layerIds[1];
      const activeLayer = cf.active === 'a' ? aLayer : bLayer;
      const inactiveLayer = cf.active === 'a' ? bLayer : aLayer;

      if (on) {
        const cur = mapInstance.getPaintProperty(activeLayer, 'raster-opacity') || 0;
        animateOpacity(activeLayer, 'raster-opacity', cur, target, 300);
        const curI = mapInstance.getPaintProperty(inactiveLayer, 'raster-opacity') || 0;
        animateOpacity(inactiveLayer, 'raster-opacity', curI, 0, 300);
      } else {
        const curA = mapInstance.getPaintProperty(aLayer, 'raster-opacity') || 0;
        animateOpacity(aLayer, 'raster-opacity', curA, 0, 300);
        const curB = mapInstance.getPaintProperty(bLayer, 'raster-opacity') || 0;
        animateOpacity(bLayer, 'raster-opacity', curB, 0, 300);
      }
      continue;
    }

    // Standard vector layers
    for (const id of layerIds) {
      if (!mapInstance.getLayer(id)) continue;
      const defs = LAYER_OPACITY[id];
      if (!defs) continue;
      for (const [prop, max] of defs) {
        const cur = mapInstance.getPaintProperty(id, prop) || 0;
        const target = on ? max : 0;
        animateOpacity(id, prop, cur, target, 300);
      }
    }
  }

  // deck.gl layers
  animateDeckOpacity('arcs', deckOpacity.arcs, vis.arcs ? 1.0 : 0, 300);
  animateDeckOpacity('wind', deckOpacity.wind, vis.wind ? 1.0 : 0, 300);
}

// ---- Timeline ----
const slider = document.getElementById('date-slider');
const dateLabel = document.getElementById('date-label');

function setDate(idx) {
  slider.value = idx;
  const date = dates[idx];
  dateLabel.textContent = fmtDate(date);

  // Shorter crossfade during playback so it completes before the next frame
  const dur = playing ? 150 : 400;

  for (const type of ['sm', 'pr']) {
    if (vis[type]) {
      crossfadeFrame(type, date, dur);
    } else {
      // Update active source silently (ready when toggled on)
      const cf = crossfade[type];
      cf.lastDate = date;
      const prefix = type === 'sm' ? 'soil-moisture' : 'precipitation';
      const src = mapInstance.getSource(prefix + '-' + cf.active);
      if (src) {
        try {
          src.updateImage({ url: 'data/raster-frames/' + prefix + '/' + date + '.png' });
        } catch (_) { /* AbortError from rapid swaps */ }
      }
    }
  }
}

slider.addEventListener('input', () => setDate(parseInt(slider.value)));

// Play/Pause (rAF-based for precise frame pacing)
const playBtn = document.getElementById('play-btn');
let lastPlayTime = 0;
function playLoop(now) {
  if (!playing) return;
  if (now - lastPlayTime >= 200) {
    lastPlayTime = now;
    let idx = parseInt(slider.value) + 1;
    if (idx > 76) idx = 0;
    setDate(idx);
  }
  playTimer = requestAnimationFrame(playLoop);
}
function togglePlay() {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) {
    lastPlayTime = performance.now();
    playTimer = requestAnimationFrame(playLoop);
  } else if (playTimer) {
    cancelAnimationFrame(playTimer);
    playTimer = null;
  }
}
playBtn.addEventListener('click', togglePlay);

// Keyboard: space = play/pause, arrows = step
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { setDate(Math.min(76, parseInt(slider.value) + 1)); }
  if (e.code === 'ArrowLeft') { setDate(Math.max(0, parseInt(slider.value) - 1)); }
});

// ---- Storm markers on timeline ----
function renderStormMarkers() {
  const el = document.getElementById('storm-markers');
  for (const s of storms) {
    const idx = dates.indexOf(s.date);
    if (idx < 0) continue;
    const pct = (idx / 76) * 100;
    const mark = document.createElement('div');
    mark.className = 'storm-mark';
    mark.style.left = `calc(${pct}% + 46px)`;
    mark.style.color = s.color;
    mark.style.borderColor = s.color + '44';
    mark.textContent = s.name;
    el.appendChild(mark);
  }
}

// ---- Wire toggles ----
function wireToggles() {
  const map = {
    't-sm': 'sm', 't-pr': 'pr', 't-mslp': 'mslp', 't-lh': 'lh',
    't-rivers': 'rivers', 't-discharge': 'discharge', 't-lightning': 'lightning',
    't-arcs': 'arcs', 't-wind': 'wind',
  };
  for (const [elId, key] of Object.entries(map)) {
    const el = document.getElementById(elId);
    el.checked = vis[key];
    el.addEventListener('change', () => {
      vis[key] = el.checked;
      if (el.checked && (key === 'sm' || key === 'pr')) {
        crossfade[key].lastDate = null;
      }
      syncVisibility();
    });
  }
}

// ---- Wire camera buttons ----
function wireCameraButtons() {
  document.querySelectorAll('.cam-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const [lng, lat] = btn.dataset.center.split(',').map(Number);
      const zoom = parseFloat(btn.dataset.zoom);
      mapInstance.flyTo({ center: [lng, lat], zoom, duration: 2000, essential: true });
    });
  });
}

// ---- Init ----
async function init() {
  const vectorData = await loadVectorData();
  deckData.wind = vectorData.wind;

  mapInstance = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-8.0, 39.5],
    zoom: 6.5,
    minZoom: 3,
    maxZoom: 14,
  });

  mapInstance.on('style.load', () => {
    addNativeLayers(mapInstance, vectorData);

    deckOverlay = new MapboxOverlay({ interleaved: true, layers: buildDeckLayers() });
    mapInstance.addControl(deckOverlay);

    wireToggles();
    wireCameraButtons();
    setDate(0);
    renderStormMarkers();

    document.getElementById('loading').classList.add('hidden');
  });
}

init().catch(err => {
  console.error('Init failed:', err);
  document.getElementById('loading').textContent = 'Error: ' + err.message;
});
</script>
