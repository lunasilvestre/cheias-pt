<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cheias.pt — Layer Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Layer panel */
    #layers {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: rgba(12, 12, 20, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 190px;
      font-size: 13px;
    }
    #layers h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: #666; margin-bottom: 8px;
    }
    .lyr {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0; cursor: pointer;
    }
    .lyr input { accent-color: #3498db; cursor: pointer; }
    .lyr label { cursor: pointer; user-select: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* Timeline bar */
    #timeline {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(12, 12, 20, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 20px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    #play-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; color: #e0e0e0; font-size: 16px;
      width: 34px; height: 34px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { border-color: rgba(255,255,255,0.4); }
    #date-slider {
      flex: 1; height: 4px; accent-color: #3498db;
      cursor: pointer;
    }
    #date-label {
      font-size: 13px; font-variant-numeric: tabular-nums;
      min-width: 110px; text-align: right; color: #ccc;
    }
    #storm-markers {
      position: absolute; bottom: 54px; left: 20px; right: 20px;
      height: 16px; z-index: 10; pointer-events: none;
    }
    .storm-mark {
      position: absolute; top: 0;
      font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
      color: #888; white-space: nowrap;
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 4px;
    }

    /* Loading */
    #loading {
      position: absolute; inset: 0; z-index: 100;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #666;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="loading">Loading...</div>
<div id="map"></div>

<div id="layers">
  <h3>Layers</h3>
  <div class="lyr"><input type="checkbox" id="t-sm" checked /><span class="dot" style="background:#2e86c1"></span><label for="t-sm">Soil moisture</label></div>
  <div class="lyr"><input type="checkbox" id="t-pr" /><span class="dot" style="background:#27ae60"></span><label for="t-pr">Precipitation</label></div>
  <div class="lyr"><input type="checkbox" id="t-mslp" /><span class="dot" style="background:#aaa"></span><label for="t-mslp">MSLP contours</label></div>
  <div class="lyr"><input type="checkbox" id="t-lh" /><span class="dot" style="background:#e74c3c"></span><label for="t-lh">L/H markers</label></div>
  <div class="lyr"><input type="checkbox" id="t-rivers" /><span class="dot" style="background:#50a0f0"></span><label for="t-rivers">Rivers</label></div>
  <div class="lyr"><input type="checkbox" id="t-discharge" /><span class="dot" style="background:#2ecc71"></span><label for="t-discharge">Discharge stations</label></div>
  <div class="lyr"><input type="checkbox" id="t-lightning" /><span class="dot" style="background:#f1c40f"></span><label for="t-lightning">Lightning</label></div>
  <div class="lyr"><input type="checkbox" id="t-arcs" checked /><span class="dot" style="background:#3498db"></span><label for="t-arcs">Storm arcs</label></div>
  <div class="lyr"><input type="checkbox" id="t-wind" /><span class="dot" style="background:#7fb3d8"></span><label for="t-wind">Wind barbs</label></div>
</div>

<div id="storm-markers"></div>

<div id="timeline">
  <button id="play-btn" title="Play/Pause">&#9654;</button>
  <input type="range" id="date-slider" min="0" max="76" value="0" />
  <span id="date-label"></span>
</div>

<script>
// ============================================================
// cheias.pt — Layer Viewer (v2)
// Raster PNGs via MapLibre image sources + deck.gl arcs only
// ============================================================

const { MapboxOverlay, ArcLayer, ScatterplotLayer } = deck;

// ---- Date array: 77 days from 2025-12-01 ----
const dates = [];
const startDate = new Date('2025-12-01');
for (let i = 0; i < 77; i++) {
  const d = new Date(startDate);
  d.setDate(startDate.getDate() + i);
  dates.push(d.toISOString().slice(0, 10));
}

// Storm date indices for timeline markers
const storms = [
  { name: 'Kristin', date: '2026-01-27', color: '#3498db' },
  { name: 'Leonardo', date: '2026-02-05', color: '#e67e22' },
  { name: 'Marta', date: '2026-02-09', color: '#e74c3c' },
];

// Raster bounds: Portugal mainland
const PT_BOUNDS = [[-9.6, 42.2], [-6.1, 42.2], [-6.1, 36.9], [-9.6, 36.9]];

// ---- State ----
const vis = {
  sm: true, pr: false, mslp: false, lh: false,
  rivers: false, discharge: false, lightning: false,
  arcs: true, wind: false,
};
let playing = false;
let playTimer = null;
let mapInstance = null;
let deckOverlay = null;
let deckData = {};

// ---- Format date for display ----
function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// ---- Data loading ----
async function loadGeoJSON(path) {
  const r = await fetch(path);
  return r.json();
}

async function loadVectorData() {
  const base = 'data/qgis/';
  const [mslp, lh, rivers, discharge, lightning, wind] = await Promise.all([
    loadGeoJSON(base + 'mslp-contours-v2.geojson'),
    loadGeoJSON(base + 'mslp-lh-markers.geojson'),
    loadGeoJSON(base + 'rivers-portugal.geojson'),
    loadGeoJSON(base + 'discharge-stations.geojson'),
    loadGeoJSON(base + 'lightning-kristin.geojson'),
    loadGeoJSON(base + 'wind-barbs-kristin.geojson'),
  ]);
  return { mslp, lh, rivers, discharge, lightning, wind };
}

// ---- Storm arc data (hardcoded approximate tracks) ----
const stormArcs = [
  { source: [-32, 34], target: [-8.5, 41.5], name: 'Kristin',  color: [52, 152, 219] },
  { source: [-30, 32], target: [-8, 39],     name: 'Leonardo', color: [230, 126, 34] },
  { source: [-28, 30], target: [-6, 38],     name: 'Marta',    color: [231, 76, 60] },
];

// ---- Build deck.gl layers ----
function buildDeckLayers() {
  const layers = [];

  if (vis.arcs) {
    layers.push(new ArcLayer({
      id: 'storm-arcs',
      data: stormArcs,
      getSourcePosition: d => d.source,
      getTargetPosition: d => d.target,
      getSourceColor: d => [...d.color, 100],
      getTargetColor: d => [...d.color, 240],
      getWidth: 3,
      greatCircle: true,
      pickable: true,
    }));
  }

  if (vis.wind && deckData.wind) {
    layers.push(new ScatterplotLayer({
      id: 'wind-barbs',
      data: deckData.wind.features,
      getPosition: d => d.geometry.coordinates,
      getRadius: d => 800 + d.properties.speed_ms * 150,
      getFillColor: d => {
        const s = d.properties.speed_ms;
        if (s > 25) return [255, 50, 50, 200];
        if (s > 15) return [255, 165, 0, 160];
        if (s > 8) return [255, 255, 100, 120];
        return [127, 179, 216, 80];
      },
      radiusMinPixels: 1,
      radiusMaxPixels: 5,
      pickable: false,
    }));
  }

  return layers;
}

function updateDeck() {
  if (deckOverlay) deckOverlay.setProps({ layers: buildDeckLayers() });
}

// ---- Add native MapLibre layers ----
function addNativeLayers(map, data) {
  // Soil moisture raster
  map.addSource('soil-moisture', {
    type: 'image',
    url: `data/raster-frames/soil-moisture/${dates[0]}.png`,
    coordinates: PT_BOUNDS,
  });
  map.addLayer({ id: 'sm-layer', type: 'raster', source: 'soil-moisture',
    paint: { 'raster-opacity': 0.8 },
  });

  // Precipitation raster
  map.addSource('precipitation', {
    type: 'image',
    url: `data/raster-frames/precipitation/${dates[0]}.png`,
    coordinates: PT_BOUNDS,
  });
  map.addLayer({ id: 'pr-layer', type: 'raster', source: 'precipitation',
    paint: { 'raster-opacity': 0.75 },
    layout: { visibility: 'none' },
  });

  // MSLP contours
  map.addSource('mslp', { type: 'geojson', data: data.mslp });
  map.addLayer({ id: 'mslp-lines', type: 'line', source: 'mslp',
    paint: { 'line-color': '#ccc', 'line-width': 0.8, 'line-opacity': 0.6 },
    layout: { visibility: 'none' },
  });
  map.addLayer({ id: 'mslp-labels', type: 'symbol', source: 'mslp',
    layout: {
      'symbol-placement': 'line',
      'text-field': ['concat', ['get', 'hPa'], ' hPa'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, -0.7],
      'text-max-angle': 30,
      visibility: 'none',
    },
    paint: {
      'text-color': '#ccc',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1.5,
    },
  });

  // L/H markers
  map.addSource('lh', { type: 'geojson', data: data.lh });
  map.addLayer({ id: 'lh-labels', type: 'symbol', source: 'lh',
    layout: {
      'text-field': ['get', 'type'],
      'text-size': 22,
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-allow-overlap': true,
      visibility: 'none',
    },
    paint: {
      'text-color': ['match', ['get', 'type'], 'L', '#e74c3c', 'H', '#3498db', '#fff'],
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 2,
    },
  });
  map.addLayer({ id: 'lh-pressure', type: 'symbol', source: 'lh',
    layout: {
      'text-field': ['concat', ['to-string', ['get', 'pressure_hpa']], ' hPa'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, 1.8],
      'text-allow-overlap': true,
      visibility: 'none',
    },
    paint: {
      'text-color': '#aaa',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1,
    },
  });

  // Rivers
  map.addSource('rivers', { type: 'geojson', data: data.rivers });
  map.addLayer({ id: 'river-lines', type: 'line', source: 'rivers',
    paint: { 'line-color': '#50a0f0', 'line-width': 2, 'line-opacity': 0.6 },
    layout: { visibility: 'none' },
  });

  // Discharge stations
  map.addSource('discharge', { type: 'geojson', data: data.discharge });
  map.addLayer({ id: 'discharge-circles', type: 'circle', source: 'discharge',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'discharge_max'],
        0, 4, 500, 8, 2000, 14, 5000, 20],
      'circle-color': '#2ecc71',
      'circle-opacity': 0.7,
      'circle-stroke-color': '#fff',
      'circle-stroke-width': 1,
      'circle-stroke-opacity': 0.4,
    },
    layout: { visibility: 'none' },
  });
  map.addLayer({ id: 'discharge-labels', type: 'symbol', source: 'discharge',
    layout: {
      'text-field': ['get', 'name'],
      'text-size': 10,
      'text-font': ['Open Sans Regular', 'Arial Unicode MS Regular'],
      'text-offset': [0, 1.5],
      'text-allow-overlap': false,
      visibility: 'none',
    },
    paint: {
      'text-color': '#ccc',
      'text-halo-color': 'rgba(10,10,20,0.8)',
      'text-halo-width': 1,
    },
  });

  // Lightning
  map.addSource('lightning', { type: 'geojson', data: data.lightning });
  map.addLayer({ id: 'lightning-circles', type: 'circle', source: 'lightning',
    paint: {
      'circle-radius': 3,
      'circle-color': '#f1c40f',
      'circle-opacity': 0.7,
    },
    layout: { visibility: 'none' },
  });
}

// ---- Layer visibility mapping ----
const LAYER_MAP = {
  sm:        ['sm-layer'],
  pr:        ['pr-layer'],
  mslp:      ['mslp-lines', 'mslp-labels'],
  lh:        ['lh-labels', 'lh-pressure'],
  rivers:    ['river-lines'],
  discharge: ['discharge-circles', 'discharge-labels'],
  lightning: ['lightning-circles'],
  // arcs + wind controlled via deck.gl
};

function syncVisibility() {
  for (const [key, layerIds] of Object.entries(LAYER_MAP)) {
    const v = vis[key] ? 'visible' : 'none';
    for (const id of layerIds) {
      if (mapInstance.getLayer(id)) mapInstance.setLayoutProperty(id, 'visibility', v);
    }
  }
  updateDeck();
}

// ---- Timeline ----
const slider = document.getElementById('date-slider');
const dateLabel = document.getElementById('date-label');

function setDate(idx) {
  slider.value = idx;
  const date = dates[idx];
  dateLabel.textContent = fmtDate(date);

  if (vis.sm && mapInstance.getSource('soil-moisture')) {
    mapInstance.getSource('soil-moisture').updateImage({
      url: `data/raster-frames/soil-moisture/${date}.png`,
    });
  }
  if (vis.pr && mapInstance.getSource('precipitation')) {
    mapInstance.getSource('precipitation').updateImage({
      url: `data/raster-frames/precipitation/${date}.png`,
    });
  }
}

slider.addEventListener('input', () => setDate(parseInt(slider.value)));

// Play/Pause
const playBtn = document.getElementById('play-btn');
function togglePlay() {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) {
    playTimer = setInterval(() => {
      let idx = parseInt(slider.value) + 1;
      if (idx > 76) { idx = 0; }
      setDate(idx);
    }, 200);
  } else {
    clearInterval(playTimer);
  }
}
playBtn.addEventListener('click', togglePlay);

// Keyboard: space = play/pause, arrows = step
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { setDate(Math.min(76, parseInt(slider.value) + 1)); }
  if (e.code === 'ArrowLeft') { setDate(Math.max(0, parseInt(slider.value) - 1)); }
});

// ---- Storm markers on timeline ----
function renderStormMarkers() {
  const el = document.getElementById('storm-markers');
  for (const s of storms) {
    const idx = dates.indexOf(s.date);
    if (idx < 0) continue;
    const pct = (idx / 76) * 100;
    const mark = document.createElement('div');
    mark.className = 'storm-mark';
    mark.style.left = `calc(${pct}% + 46px)`; // offset for play button
    mark.style.color = s.color;
    mark.style.borderColor = s.color + '44';
    mark.textContent = s.name;
    el.appendChild(mark);
  }
}

// ---- Wire toggles ----
function wireToggles() {
  const map = {
    't-sm': 'sm', 't-pr': 'pr', 't-mslp': 'mslp', 't-lh': 'lh',
    't-rivers': 'rivers', 't-discharge': 'discharge', 't-lightning': 'lightning',
    't-arcs': 'arcs', 't-wind': 'wind',
  };
  for (const [elId, key] of Object.entries(map)) {
    const el = document.getElementById(elId);
    el.checked = vis[key];
    el.addEventListener('change', () => {
      vis[key] = el.checked;
      syncVisibility();
    });
  }
}

// ---- Init ----
async function init() {
  const vectorData = await loadVectorData();
  deckData.wind = vectorData.wind;

  mapInstance = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-8.0, 39.5],
    zoom: 6.5,
    minZoom: 3,
    maxZoom: 14,
  });

  mapInstance.on('style.load', () => {
    addNativeLayers(mapInstance, vectorData);
    syncVisibility();

    deckOverlay = new MapboxOverlay({ interleaved: true, layers: buildDeckLayers() });
    mapInstance.addControl(deckOverlay);

    wireToggles();
    setDate(0);
    renderStormMarkers();

    document.getElementById('loading').classList.add('hidden');
  });
}

init().catch(err => {
  console.error('Init failed:', err);
  document.getElementById('loading').textContent = 'Error: ' + err.message;
});
</script>
</body>
</html>
