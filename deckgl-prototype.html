<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cheias.pt — Layer Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Side panels */
    #side-panels {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }
    .glass-panel {
      background: rgba(12, 12, 20, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
    }

    /* Layers */
    #layers { min-width: 190px; font-size: 13px; }
    #layers h3, #camera h3, #colormap-panel h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: #666; margin-bottom: 8px;
    }
    .lyr {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0; cursor: pointer;
    }
    .lyr input { accent-color: #3498db; cursor: pointer; }
    .lyr label { cursor: pointer; user-select: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .section-div { height: 1px; background: rgba(255,255,255,0.06); margin: 6px 0; }

    /* Camera */
    .cam-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .cam-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; color: #ccc;
      font-size: 11px; font-family: inherit; letter-spacing: 0.5px;
      padding: 5px 12px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .cam-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25); color: #fff;
    }

    /* Colormap */
    #colormap-panel select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; color: #ccc;
      font-size: 12px; font-family: inherit;
      padding: 5px 8px; cursor: pointer;
    }
    #colormap-panel select:focus { outline: none; border-color: rgba(255,255,255,0.3); }

    /* Timeline */
    #timeline {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(12, 12, 20, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 20px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    #play-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; color: #e0e0e0; font-size: 16px;
      width: 34px; height: 34px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { border-color: rgba(255,255,255,0.4); }
    #date-slider { flex: 1; height: 4px; accent-color: #3498db; cursor: pointer; }
    #date-label {
      font-size: 13px; font-variant-numeric: tabular-nums;
      min-width: 110px; text-align: right; color: #ccc;
    }
    #storm-markers {
      position: absolute; bottom: 54px; left: 20px; right: 20px;
      height: 16px; z-index: 10; pointer-events: none;
    }
    .storm-mark {
      position: absolute; top: 0;
      font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
      color: #888; white-space: nowrap;
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 4px;
    }

    /* Sub-timeline (hour selectors) */
    #sub-timeline {
      position: absolute; bottom: 76px; left: 20px; z-index: 10;
      display: flex; gap: 10px;
    }
    .hour-selector {
      background: rgba(12, 12, 20, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      display: flex; align-items: center; gap: 6px;
    }
    .hs-label {
      color: #666; font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.8px; margin-right: 2px;
    }
    .hour-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; color: #999;
      font-size: 10px; font-family: inherit;
      padding: 2px 6px; cursor: pointer;
      transition: all 0.15s;
    }
    .hour-btn:hover { background: rgba(255,255,255,0.12); color: #ccc; }
    .hour-btn.active { background: rgba(52,152,219,0.3); border-color: #3498db; color: #fff; }
    .satir-slider {
      width: 100px; height: 3px; accent-color: #9b59b6; cursor: pointer;
    }
    .satir-hour-val {
      font-variant-numeric: tabular-nums; min-width: 36px; color: #ccc;
    }

    /* Loading */
    #loading {
      position: absolute; inset: 0; z-index: 100;
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #666;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Attribution */
    #cog-attribution {
      position: absolute; bottom: 60px; right: 12px; z-index: 5;
      font-size: 10px; line-height: 1.6; text-align: right;
      color: rgba(255,255,255,0.3);
    }
    #cog-attribution a {
      color: rgba(255,255,255,0.35); text-decoration: none;
    }
    #cog-attribution a:hover { color: rgba(255,255,255,0.6); }

    /* Wind particles */
    .wind-density {
      padding: 2px 0 2px 23px;
      display: flex; align-items: center; gap: 6px;
    }
    .wind-density input[type="range"] {
      width: 80px; height: 3px; accent-color: #a855f7; cursor: pointer;
    }
    .wind-density span {
      font-size: 10px; color: #888;
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }
    #wind-legend {
      position: absolute; bottom: 64px; left: 12px; z-index: 5;
    }
    .wl-bar {
      width: 120px; height: 6px; border-radius: 3px;
      background: linear-gradient(to right, rgb(0,200,100), rgb(255,255,100) 35%, rgb(255,165,0) 65%, rgb(180,0,255));
    }
    .wl-labels {
      display: flex; justify-content: space-between;
      font-size: 9px; color: rgba(255,255,255,0.4);
      margin-top: 2px; width: 120px;
    }
    .wl-title {
      font-size: 8px; color: rgba(255,255,255,0.3);
      text-align: center; margin-top: 1px; width: 120px;
    }
  </style>
</head>
<body>

<div id="loading">Loading...</div>
<div id="map"></div>

<div id="side-panels">
  <div id="layers" class="glass-panel">
    <h3>Layers</h3>
    <div class="lyr"><input type="checkbox" id="t-sm" checked /><span class="dot" style="background:#2e86c1"></span><label for="t-sm">Soil moisture</label></div>
    <div class="lyr"><input type="checkbox" id="t-pr" /><span class="dot" style="background:#27ae60"></span><label for="t-pr">Precipitation</label></div>
    <div class="lyr"><input type="checkbox" id="t-satir" /><span class="dot" style="background:#9b59b6"></span><label for="t-satir">Satellite IR</label></div>

<div id="sub-timeline">

    <span class="hs-label">UTC</span>

<div id="cog-attribution">
  Data: COG from <a href="https://developers.cloudflare.com/r2/" target="_blank" rel="noopener">Cloudflare R2</a><br>
  Rendered with <a href="https://geotiffjs.github.io/" target="_blank" rel="noopener">geotiff.js</a> + <a href="https://deck.gl" target="_blank" rel="noopener">deck.gl</a>
</div>

<script>
// ============================================================
// cheias.pt — Layer Viewer (v3.0)
// Cloud-native COG rendering from Cloudflare R2
// ============================================================

const { MapboxOverlay, ArcLayer, BitmapLayer, PathLayer } = deck;

// ---- geotiff.js lazy loader ----
let GeoTIFF = null;
async function ensureGeoTIFF() {
  if (!GeoTIFF) {
    const mod = await import('https://esm.sh/geotiff@2.1.3');
    GeoTIFF = mod;
  }
  return GeoTIFF;
}

// ---- Colormap LUT factory ----
function makeLUT(stops) {
  return function(t) {
    t = Math.max(0, Math.min(1, t));
    const idx = t * (stops.length - 1);
    const lo = Math.floor(idx);
    const hi = Math.min(lo + 1, stops.length - 1);
    const f = idx - lo;
    return [
      Math.round(stops[lo][0] * (1 - f) + stops[hi][0] * f),
      Math.round(stops[lo][1] * (1 - f) + stops[hi][1] * f),
      Math.round(stops[lo][2] * (1 - f) + stops[hi][2] * f),
    ];
  };
}

const viridisLUT = makeLUT([
  [68,1,84],[72,33,115],[67,62,133],[56,88,140],
  [45,112,142],[37,133,142],[30,155,138],[42,176,127],
  [81,197,105],[134,213,73],[194,223,35],[253,231,37],
]);
const bluesLUT = makeLUT([
  [8,29,88],[37,52,148],[34,94,168],[29,145,192],
  [65,182,196],[127,205,187],[199,233,180],[237,248,177],
]);
const irLUT = makeLUT([
  [20,20,20],[40,40,80],[60,60,150],[100,60,180],
  [180,40,120],[220,80,40],[250,160,0],[255,255,100],
]);
const mslpLUT = makeLUT([
  [33,102,172],[67,147,195],[146,197,222],[209,229,240],
  [247,247,247],[253,219,199],[244,165,130],[214,96,77],[178,24,43],
]);
const plasmaLUT = makeLUT([
  [13,8,135],[75,3,161],[125,3,168],[168,34,150],
  [203,70,121],[229,107,93],[248,148,65],[253,195,40],[240,249,33],
]);
const infernoLUT = makeLUT([
  [0,0,4],[22,11,57],[66,10,104],[106,23,110],
  [147,38,103],[188,55,84],[221,81,58],[243,120,25],
  [252,165,10],[246,215,70],[252,255,164],
]);
function greysLUT(t) {
  t = Math.max(0, Math.min(1, t));
  const v = Math.round(t * 255);
  return [v, v, v];
}

const COLORMAPS = {
  viridis: viridisLUT, blues: bluesLUT, thermal: irLUT,
  mslp: mslpLUT, plasma: plasmaLUT, inferno: infernoLUT, greys: greysLUT,
};

// ---- R2 COG configuration ----
const R2_BASE = 'https://pub-abad2527698d4bbab82318691c9b07a1.r2.dev/cog';

const RASTER_LAYERS = {
  sm: {
    urlFn: (date) => `${R2_BASE}/soil-moisture/${date}.tif`,
    defaultCmap: 'blues', rescale: null, maxOpacity: 0.8, swappable: true,
  },
  pr: {
    urlFn: (date) => `${R2_BASE}/precipitation/${date}.tif`,
    defaultCmap: 'viridis', rescale: null, maxOpacity: 0.75, swappable: true,
  },
  satir: {
    urlFn: (date, hour) => {
      if (date < '2026-01-27' || date > '2026-01-28') return null;
      const h = String(hour != null ? hour : 12).padStart(2, '0');
      return `${R2_BASE}/satellite-ir/${date}T${h}-00.tif`;
    },
    defaultCmap: 'thermal', rescale: null, maxOpacity: 0.9, swappable: false,
  },
  mslpf: {
    urlFn: (date, hour) => {
      const h = String(hour != null ? hour : 12).padStart(2, '0');
      return `${R2_BASE}/mslp/${date}T${h}.tif`;
    },
    defaultCmap: 'mslp', rescale: [98000, 104000], maxOpacity: 0.6, swappable: false,
  },
};

// Render order: bottom layer first
const RASTER_ORDER = ['mslpf', 'sm', 'pr', 'satir'];

// ---- Date array: 77 days from 2025-12-01 ----
const dates = [];
const startDate = new Date('2025-12-01');
for (let i = 0; i < 77; i++) {
  const d = new Date(startDate);
  d.setDate(startDate.getDate() + i);
  dates.push(d.toISOString().slice(0, 10));
}

const storms = [
  { name: 'Kristin', date: '2026-01-27', color: '#3498db' },
  { name: 'Leonardo', date: '2026-02-05', color: '#e67e22' },
  { name: 'Marta', date: '2026-02-09', color: '#e74c3c' },
];

// ---- State ----
const vis = {
  sm: true, pr: false, satir: false, mslpf: false,
  mslp: false, lh: false, rivers: false, discharge: false,
  lightning: false, arcs: true, wind: false, wp: false,
};
let playing = false;
let playTimer = null;
let mapInstance = null;
let deckOverlay = null;
let activeColormap = 'default';

// Hour selections for sub-daily layers
const rasterHour = { satir: 12, mslpf: 12 };

// Raster dual-buffer state (A/B for crossfade)
const rasterBuf = {};
for (const key of Object.keys(RASTER_LAYERS)) {
  rasterBuf[key] = {
    activeIs: 'a',
    a: null, // { canvas, bounds }
    b: null,
    opA: 0, opB: 0,
    fadeAnim: null,
    currentUrl: null,
  };
}

// COG data caches
const rawCache = new Map();   // url -> { band, width, height, bounds, dMin, dMax }
const canvasCache = new Map(); // "url::cmapName" -> { canvas, bounds }
const MAX_RAW_CACHE = 12;
const MAX_CANVAS_CACHE = 20;

// MapLibre animation tracking
const activeAnimations = {};

// deck.gl vector layer opacity
const deckOpacity = { arcs: 1.0, wind: 0.0, wp: 0.0 };
const deckAnimations = {};

// Wind particle state
let windField = null;
let windParticles = [];
let windParticleCount = 2000;
let windAnimFrame = null;
let windFieldLoading = false;
let windFieldKey = null;
let windBarbData = [];

// ---- COG rendering pipeline ----
async function fetchCOGRaw(url) {
  if (rawCache.has(url)) return rawCache.get(url);

  const gt = await ensureGeoTIFF();
  const tiff = await gt.fromUrl(url);
  const image = await tiff.getImage();
  const width = image.getWidth();
  const height = image.getHeight();
  const bounds = image.getBoundingBox(); // [west, south, east, north]
  const rasters = await image.readRasters({ samples: [0] });
  const band = rasters[0];

  let dMin = Infinity, dMax = -Infinity;
  for (let i = 0; i < band.length; i++) {
    const v = band[i];
    if (!isNaN(v) && isFinite(v)) {
      if (v < dMin) dMin = v;
      if (v > dMax) dMax = v;
    }
  }

  const raw = { band, width, height, bounds, dMin, dMax };
  if (rawCache.size >= MAX_RAW_CACHE) {
    rawCache.delete(rawCache.keys().next().value);
  }
  rawCache.set(url, raw);
  return raw;
}

function renderBandToCanvas(raw, colormapFn, rescale) {
  const { band, width, height, dMin: autoMin, dMax: autoMax } = raw;
  const [dMin, dMax] = rescale || [autoMin, autoMax];

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(width, height);

  const range = dMax - dMin || 1;
  for (let i = 0; i < band.length; i++) {
    const v = band[i];
    const px = i * 4;
    if (isNaN(v) || !isFinite(v)) {
      imgData.data[px + 3] = 0; // transparent nodata
    } else {
      const t = Math.max(0, Math.min(1, (v - dMin) / range));
      const [r, g, b] = colormapFn(t);
      imgData.data[px] = r;
      imgData.data[px + 1] = g;
      imgData.data[px + 2] = b;
      imgData.data[px + 3] = 200;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

function getActiveColormapName(layerKey) {
  const cfg = RASTER_LAYERS[layerKey];
  return (activeColormap !== 'default' && cfg.swappable) ? activeColormap : cfg.defaultCmap;
}

function getColormapFn(layerKey) {
  return COLORMAPS[getActiveColormapName(layerKey)];
}

async function renderCOG(url, layerKey) {
  const cmapName = getActiveColormapName(layerKey);
  const cacheKey = `${url}::${cmapName}`;

  if (canvasCache.has(cacheKey)) return canvasCache.get(cacheKey);

  const raw = await fetchCOGRaw(url);
  const canvas = renderBandToCanvas(raw, COLORMAPS[cmapName], RASTER_LAYERS[layerKey].rescale);
  const result = { canvas, bounds: raw.bounds };

  if (canvasCache.size >= MAX_CANVAS_CACHE) {
    canvasCache.delete(canvasCache.keys().next().value);
  }
  canvasCache.set(cacheKey, result);
  return result;
}

// ---- Wind particle system ----
const WIND_BOUNDS = [-35, 28, 5, 56];
const MAX_TRAIL = 12;
const MAX_AGE = 150;
const SPEED_MULT = 0.001;

async function loadWindFieldData(date, hour) {
  const h = String(hour != null ? hour : 12).padStart(2, '0');
  const key = `${date}:${h}`;
  if (key === windFieldKey && windField) return windField;

  const uUrl = `${R2_BASE}/wind-u/${date}T${h}.tif`;
  const vUrl = `${R2_BASE}/wind-v/${date}T${h}.tif`;
  const [uRaw, vRaw] = await Promise.all([fetchCOGRaw(uUrl), fetchCOGRaw(vUrl)]);

  windField = {
    uData: uRaw.band, vData: vRaw.band,
    width: uRaw.width, height: uRaw.height,
    bbox: uRaw.bounds,
  };
  windFieldKey = key;
  return windField;
}

function sampleWind(lon, lat, field) {
  if (!field) return [0, 0];
  const [west, south, east, north] = field.bbox;
  const fx = (lon - west) / (east - west) * (field.width - 1);
  const fy = (north - lat) / (north - south) * (field.height - 1);
  if (fx < 0 || fx >= field.width - 1 || fy < 0 || fy >= field.height - 1) return [0, 0];

  const ix = Math.floor(fx), iy = Math.floor(fy);
  const dx = fx - ix, dy = fy - iy;
  const w = field.width;
  const i00 = iy * w + ix, i10 = i00 + 1, i01 = i00 + w, i11 = i01 + 1;

  const u = field.uData[i00]*(1-dx)*(1-dy) + field.uData[i10]*dx*(1-dy)
          + field.uData[i01]*(1-dx)*dy + field.uData[i11]*dx*dy;
  const v = field.vData[i00]*(1-dx)*(1-dy) + field.vData[i10]*dx*(1-dy)
          + field.vData[i01]*(1-dx)*dy + field.vData[i11]*dx*dy;
  if (isNaN(u) || isNaN(v)) return [0, 0];
  return [u, v];
}

function windSpeedColor(speed) {
  if (speed > 25) return [180, 0, 255];
  if (speed > 15) return [255, 165, 0];
  if (speed > 8)  return [255, 255, 100];
  return [0, 200, 100];
}

function spawnParticle() {
  const lon = WIND_BOUNDS[0] + Math.random() * (WIND_BOUNDS[2] - WIND_BOUNDS[0]);
  const lat = WIND_BOUNDS[1] + Math.random() * (WIND_BOUNDS[3] - WIND_BOUNDS[1]);
  return { lon, lat, age: 0, trail: [[lon, lat]], speed: 0 };
}

function initWindParticles() {
  windParticles = [];
  for (let i = 0; i < windParticleCount; i++) windParticles.push(spawnParticle());
}

function advectParticles() {
  if (!windField) return;
  for (let i = 0; i < windParticles.length; i++) {
    const p = windParticles[i];
    const [u, v] = sampleWind(p.lon, p.lat, windField);
    p.speed = Math.sqrt(u * u + v * v);

    p.lon += u * SPEED_MULT / Math.cos(p.lat * Math.PI / 180);
    p.lat += v * SPEED_MULT;
    p.trail.push([p.lon, p.lat]);
    if (p.trail.length > MAX_TRAIL) p.trail.shift();
    p.age++;

    if (p.age > MAX_AGE ||
        p.lon < WIND_BOUNDS[0] || p.lon > WIND_BOUNDS[2] ||
        p.lat < WIND_BOUNDS[1] || p.lat > WIND_BOUNDS[3] ||
        p.speed < 0.5 ||
        (p.age > 30 && Math.random() < 0.03)) {
      windParticles[i] = spawnParticle();
    }
  }
}

let lastWindFrameTime = 0;
function windAnimLoop(now) {
  if (!vis.wp || !windField) { windAnimFrame = null; return; }
  if (now - lastWindFrameTime >= 33) {
    lastWindFrameTime = now;
    advectParticles();
    updateDeck();
  }
  windAnimFrame = requestAnimationFrame(windAnimLoop);
}

function startWindAnimation() {
  if (windAnimFrame) return;
  lastWindFrameTime = performance.now();
  windAnimFrame = requestAnimationFrame(windAnimLoop);
}

function stopWindAnimation() {
  if (windAnimFrame) { cancelAnimationFrame(windAnimFrame); windAnimFrame = null; }
}

function generateWindBarbs(field) {
  if (!field) return [];
  const [west, south, east, north] = field.bbox;
  const barbs = [];
  const step = 1; // 1° grid
  const lonMin = Math.max(Math.ceil(west), WIND_BOUNDS[0]);
  const lonMax = Math.min(Math.floor(east), WIND_BOUNDS[2]);
  const latMin = Math.max(Math.ceil(south), WIND_BOUNDS[1]);
  const latMax = Math.min(Math.floor(north), WIND_BOUNDS[3]);

  for (let lon = lonMin; lon <= lonMax; lon += step) {
    for (let lat = latMin; lat <= latMax; lat += step) {
      const [u, v] = sampleWind(lon, lat, field);
      const speed = Math.sqrt(u * u + v * v);
      if (speed < 1) continue;

      const len = Math.min(speed * 0.035, 1.0);
      const cosLat = Math.cos(lat * Math.PI / 180);
      const dx = (u / speed) * len / cosLat;
      const dy = (v / speed) * len;

      barbs.push({ path: [[lon, lat], [lon + dx, lat + dy]], speed });
    }
  }
  return barbs;
}

async function loadWindFieldForCurrentDate() {
  if (windFieldLoading) return;
  windFieldLoading = true;
  const idx = parseInt(slider.value);
  const date = dates[idx];
  const hour = rasterHour.mslpf || 12;
  try {
    await loadWindFieldData(date, hour);
    if (vis.wp) {
      if (windParticles.length !== windParticleCount) initWindParticles();
      startWindAnimation();
    }
    if (vis.wind) {
      windBarbData = generateWindBarbs(windField);
      updateDeck();
    }
  } catch (err) {
    console.warn('Wind field load failed:', err.message);
  } finally {
    windFieldLoading = false;
  }
}

// ---- Storm arc data ----
const stormArcs = [
  { source: [-32, 34], target: [-8.5, 41.5], name: 'Kristin',  color: [52, 152, 219] },
  { source: [-30, 32], target: [-8, 39],     name: 'Leonardo', color: [230, 126, 34] },
  { source: [-28, 30], target: [-6, 38],     name: 'Marta',    color: [231, 76, 60] },
];

// ---- Build deck.gl layers ----
function buildDeckLayers() {
  const layers = [];

  // Raster BitmapLayers (bottom-to-top order)
  for (const key of RASTER_ORDER) {
    const buf = rasterBuf[key];
    if (buf.a && buf.opA > 0.005) {
      layers.push(new BitmapLayer({
        id: `${key}-a`, image: buf.a.canvas,
        bounds: buf.a.bounds, opacity: buf.opA, pickable: false,
      }));
    }
    if (buf.b && buf.opB > 0.005) {
      layers.push(new BitmapLayer({
        id: `${key}-b`, image: buf.b.canvas,
        bounds: buf.b.bounds, opacity: buf.opB, pickable: false,
      }));
    }
  }

  // Storm arcs
  if (deckOpacity.arcs > 0.01) {
    layers.push(new ArcLayer({
      id: 'storm-arcs', data: stormArcs,
      getSourcePosition: d => d.source,
      getTargetPosition: d => d.target,
      getSourceColor: d => [...d.color, 100],
      getTargetColor: d => [...d.color, 240],
      getWidth: 3, greatCircle: true, pickable: true,
      opacity: deckOpacity.arcs,
    }));
  }

  // Wind barbs (dynamic from U/V field)
  if (deckOpacity.wind > 0.01 && windBarbData.length > 0) {
    layers.push(new PathLayer({
      id: 'wind-barbs',
      data: windBarbData,
      getPath: d => d.path,
      getColor: d => {
        const [r, g, b] = windSpeedColor(d.speed);
        return [r, g, b, 180];
      },
      getWidth: 2,
      widthMinPixels: 1,
      widthMaxPixels: 3,
      capRounded: true,
      opacity: deckOpacity.wind,
    }));
  }

  // Wind particles
  if (deckOpacity.wp > 0.01 && windField) {
    const pathData = [];
    for (let i = 0; i < windParticles.length; i++) {
      if (windParticles[i].trail.length >= 2) pathData.push(windParticles[i]);
    }
    if (pathData.length > 0) {
      layers.push(new PathLayer({
        id: 'wind-particles',
        data: pathData,
        getPath: d => d.trail,
        getColor: d => {
          const [r, g, b] = windSpeedColor(d.speed);
          const fade = Math.max(0.3, 1 - d.age / MAX_AGE);
          return [r, g, b, Math.round(180 * fade)];
        },
        getWidth: 1.5,
        widthMinPixels: 1,
        widthMaxPixels: 2.5,
        jointRounded: true,
        capRounded: true,
        opacity: deckOpacity.wp,
        updateTriggers: { getPath: Date.now(), getColor: Date.now() },
      }));
    }
  }

  return layers;
}

function updateDeck() {
  if (deckOverlay) deckOverlay.setProps({ layers: buildDeckLayers() });
}

// ---- Raster crossfade animations ----
function crossfadeRaster(key, canvas, bounds, duration) {
  const buf = rasterBuf[key];
  const maxOp = RASTER_LAYERS[key].maxOpacity;

  if (buf.fadeAnim) { cancelAnimationFrame(buf.fadeAnim); buf.fadeAnim = null; }

  // Load new data into the INACTIVE buffer
  const inactive = buf.activeIs === 'a' ? 'b' : 'a';
  buf[inactive] = { canvas, bounds };

  const activeKey = buf.activeIs === 'a' ? 'opA' : 'opB';
  const inactiveKey = inactive === 'a' ? 'opA' : 'opB';
  const startActive = buf[activeKey];
  const startInactive = buf[inactiveKey];

  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    const e = t * t * (3 - 2 * t); // smoothstep
    buf[activeKey] = Math.max(0, startActive * (1 - e));
    buf[inactiveKey] = startInactive + (maxOp - startInactive) * e;
    updateDeck();
    if (t < 1) {
      buf.fadeAnim = requestAnimationFrame(tick);
    } else {
      buf.fadeAnim = null;
      buf.activeIs = inactive;
    }
  }
  buf.fadeAnim = requestAnimationFrame(tick);
}

function fadeInRaster(key, duration) {
  const buf = rasterBuf[key];
  const maxOp = RASTER_LAYERS[key].maxOpacity;
  const opKey = buf.activeIs === 'a' ? 'opA' : 'opB';

  if (buf.fadeAnim) { cancelAnimationFrame(buf.fadeAnim); buf.fadeAnim = null; }

  const from = buf[opKey];
  if (Math.abs(from - maxOp) < 0.01) { buf[opKey] = maxOp; updateDeck(); return; }

  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    buf[opKey] = from + (maxOp - from) * t;
    updateDeck();
    if (t < 1) buf.fadeAnim = requestAnimationFrame(tick);
    else buf.fadeAnim = null;
  }
  buf.fadeAnim = requestAnimationFrame(tick);
}

function fadeOutRaster(key, duration) {
  const buf = rasterBuf[key];
  if (buf.fadeAnim) { cancelAnimationFrame(buf.fadeAnim); buf.fadeAnim = null; }

  const fromA = buf.opA, fromB = buf.opB;
  if (fromA < 0.01 && fromB < 0.01) return;

  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    buf.opA = fromA * (1 - t);
    buf.opB = fromB * (1 - t);
    updateDeck();
    if (t < 1) buf.fadeAnim = requestAnimationFrame(tick);
    else buf.fadeAnim = null;
  }
  buf.fadeAnim = requestAnimationFrame(tick);
}

// ---- Load raster for a given date ----
async function loadRasterForDate(key, date) {
  const cfg = RASTER_LAYERS[key];
  const url = cfg.urlFn(date, rasterHour[key]);

  if (!url) {
    // No data for this date (e.g. satellite outside Jan 27-28)
    fadeOutRaster(key, 200);
    rasterBuf[key].currentUrl = null;
    return;
  }
  if (url === rasterBuf[key].currentUrl) return;
  rasterBuf[key].currentUrl = url;

  try {
    const { canvas, bounds } = await renderCOG(url, key);

    // Guard: URL may have changed while we were fetching
    if (rasterBuf[key].currentUrl !== url) return;

    const buf = rasterBuf[key];
    if (!buf[buf.activeIs]) {
      // First frame — set directly, no crossfade
      buf[buf.activeIs] = { canvas, bounds };
      buf[buf.activeIs === 'a' ? 'opA' : 'opB'] = cfg.maxOpacity;
      updateDeck();
    } else {
      const dur = playing ? 150 : 400;
      crossfadeRaster(key, canvas, bounds, dur);
    }
  } catch (err) {
    console.warn(`COG load failed for ${key}: ${err.message}`);
  }
}

function prefetchNext(key, nextDate) {
  const cfg = RASTER_LAYERS[key];
  const url = cfg.urlFn(nextDate, rasterHour[key]);
  if (url && !rawCache.has(url)) {
    fetchCOGRaw(url).catch(() => {});
  }
}

// ---- Format date for display ----
function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// ---- MapLibre paint property animation ----
function animateOpacity(layerId, property, from, to, duration) {
  const key = layerId + ':' + property;
  if (activeAnimations[key]) { cancelAnimationFrame(activeAnimations[key]); delete activeAnimations[key]; }
  if (Math.abs(from - to) < 0.005) {
    if (mapInstance.getLayer(layerId)) mapInstance.setPaintProperty(layerId, property, to);
    return;
  }
  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    const val = Math.max(0, from + (to - from) * t);
    if (mapInstance.getLayer(layerId)) mapInstance.setPaintProperty(layerId, property, val);
    if (t < 1) activeAnimations[key] = requestAnimationFrame(tick);
    else delete activeAnimations[key];
  }
  activeAnimations[key] = requestAnimationFrame(tick);
}

// ---- deck.gl vector opacity animation ----
function animateDeckOpacity(key, from, to, duration) {
  if (deckAnimations[key]) cancelAnimationFrame(deckAnimations[key]);
  if (Math.abs(from - to) < 0.005) { deckOpacity[key] = to; updateDeck(); return; }
  const t0 = performance.now();
  function tick(now) {
    const t = Math.min((now - t0) / duration, 1);
    deckOpacity[key] = from + (to - from) * t;
    updateDeck();
    if (t < 1) deckAnimations[key] = requestAnimationFrame(tick);
    else delete deckAnimations[key];
  }
  deckAnimations[key] = requestAnimationFrame(tick);
}

// ---- MapLibre layer opacity targets ----
const LAYER_OPACITY = {
  'mslp-lines':        [['line-opacity', 0.6]],
  'mslp-labels':       [['text-opacity', 1.0]],
  'lh-labels':         [['text-opacity', 1.0]],
  'lh-pressure':       [['text-opacity', 1.0]],
  'river-lines':       [['line-opacity', 0.6]],
  'discharge-circles': [['circle-opacity', 0.7], ['circle-stroke-opacity', 0.4]],
  'discharge-labels':  [['text-opacity', 1.0]],
  'lightning-circles': [['circle-opacity', 0.7]],
};

const LAYER_MAP = {
  mslp:      ['mslp-lines', 'mslp-labels'],
  lh:        ['lh-labels', 'lh-pressure'],
  rivers:    ['river-lines'],
  discharge: ['discharge-circles', 'discharge-labels'],
  lightning: ['lightning-circles'],
};

// ---- Visibility sync ----
function syncVisibility() {
  // Raster layers (deck.gl BitmapLayers)
  for (const key of Object.keys(RASTER_LAYERS)) {
    if (vis[key]) {
      const buf = rasterBuf[key];
      if (buf[buf.activeIs]) {
        fadeInRaster(key, 300);
      } else {
        // Need to load the frame first
        const idx = parseInt(slider.value);
        loadRasterForDate(key, dates[idx]);
      }
    } else {
      fadeOutRaster(key, 300);
    }
  }

  // MapLibre vector layers
  for (const [key, layerIds] of Object.entries(LAYER_MAP)) {
    const on = vis[key];
    for (const id of layerIds) {
      if (!mapInstance.getLayer(id)) continue;
      const defs = LAYER_OPACITY[id];
      if (!defs) continue;
      for (const [prop, max] of defs) {
        const cur = mapInstance.getPaintProperty(id, prop) || 0;
        animateOpacity(id, prop, cur, on ? max : 0, 300);
      }
    }
  }

  // deck.gl vector layers
  animateDeckOpacity('arcs', deckOpacity.arcs, vis.arcs ? 1.0 : 0, 300);

  // Wind barbs (dynamic)
  if (vis.wind) {
    loadWindFieldForCurrentDate();
    animateDeckOpacity('wind', deckOpacity.wind, 1.0, 300);
  } else {
    animateDeckOpacity('wind', deckOpacity.wind, 0, 300);
  }

  // Wind particles
  if (vis.wp) {
    loadWindFieldForCurrentDate();
    animateDeckOpacity('wp', deckOpacity.wp, 1.0, 300);
    document.getElementById('wind-density').style.display = 'flex';
    document.getElementById('wind-legend').style.display = 'block';
  } else {
    animateDeckOpacity('wp', deckOpacity.wp, 0, 300);
    setTimeout(() => { if (!vis.wp) stopWindAnimation(); }, 350);
    document.getElementById('wind-density').style.display = 'none';
    document.getElementById('wind-legend').style.display = 'none';
  }

  updateHourSelectors();
}

// ---- Hour selectors ----
function updateHourSelectors() {
  const idx = parseInt(slider.value);
  const date = dates[idx];

  // Satellite IR: only Jan 27-28
  const showSat = vis.satir && date >= '2026-01-27' && date <= '2026-01-28';
  document.getElementById('satir-hours').style.display = showSat ? 'flex' : 'none';

  // MSLP field / wind layers share 6-hourly selector
  document.getElementById('mslp-hours').style.display = (vis.mslpf || vis.wp || vis.wind) ? 'flex' : 'none';
}

function wireSatirHourSlider() {
  const sl = document.getElementById('satir-slider');
  const val = document.getElementById('satir-hour-val');
  sl.addEventListener('input', () => {
    const h = parseInt(sl.value);
    val.textContent = String(h).padStart(2, '0') + ':00';
    rasterHour.satir = h;
    rasterBuf.satir.currentUrl = null; // force reload
    const idx = parseInt(slider.value);
    loadRasterForDate('satir', dates[idx]);
  });
}

function wireMslpHourButtons() {
  document.querySelectorAll('#mslp-hours .hour-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mslp-hours .hour-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      rasterHour.mslpf = parseInt(btn.dataset.hour);
      rasterBuf.mslpf.currentUrl = null;
      const idx = parseInt(slider.value);
      loadRasterForDate('mslpf', dates[idx]);
      if (vis.wp || vis.wind) { windFieldKey = null; loadWindFieldForCurrentDate(); }
    });
  });
}

// ---- Colormap selector ----
function wireColormapSelector() {
  document.getElementById('colormap-select').addEventListener('change', (e) => {
    activeColormap = e.target.value;
    canvasCache.clear(); // invalidate rendered canvases

    // Re-render visible swappable layers from cached raw data
    for (const key of Object.keys(RASTER_LAYERS)) {
      if (!vis[key] || !RASTER_LAYERS[key].swappable) continue;
      const buf = rasterBuf[key];
      const url = buf.currentUrl;
      if (!url || !rawCache.has(url)) continue;

      const raw = rawCache.get(url);
      const canvas = renderBandToCanvas(raw, getColormapFn(key), RASTER_LAYERS[key].rescale);
      buf[buf.activeIs] = { canvas, bounds: raw.bounds };
    }
    updateDeck();
  });
}

// ---- Wind density slider ----
function wireWindDensity() {
  const sl = document.getElementById('wp-density');
  const val = document.getElementById('wp-count');
  sl.addEventListener('input', () => {
    windParticleCount = parseInt(sl.value);
    val.textContent = windParticleCount.toLocaleString();
    while (windParticles.length > windParticleCount) windParticles.pop();
    while (windParticles.length < windParticleCount) windParticles.push(spawnParticle());
  });
}

// ---- Data loading ----
async function loadGeoJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error('Failed to load ' + path + ': ' + r.status);
  return r.json();
}

async function loadVectorData() {
  const base = 'data/qgis/';
  const [mslp, lh, rivers, discharge, lightning] = await Promise.all([
    loadGeoJSON(base + 'mslp-contours-v2.geojson'),
    loadGeoJSON(base + 'mslp-lh-markers.geojson'),
    loadGeoJSON(base + 'rivers-portugal.geojson'),
    loadGeoJSON(base + 'discharge-stations.geojson'),
    loadGeoJSON(base + 'lightning-kristin.geojson'),
  ]);
  return { mslp, lh, rivers, discharge, lightning };
}

// ---- Timeline ----
const slider = document.getElementById('date-slider');
const dateLabel = document.getElementById('date-label');

function setDate(idx) {
  slider.value = idx;
  const date = dates[idx];
  dateLabel.textContent = fmtDate(date);

  // Load visible raster layers
  for (const key of Object.keys(RASTER_LAYERS)) {
    if (vis[key]) loadRasterForDate(key, date);
  }

  // Load wind field for particles and/or barbs
  if (vis.wp || vis.wind) loadWindFieldForCurrentDate();

  // Pre-fetch next frame
  const nextIdx = Math.min(idx + 1, 76);
  if (nextIdx !== idx) {
    for (const key of Object.keys(RASTER_LAYERS)) {
      if (vis[key]) prefetchNext(key, dates[nextIdx]);
    }
  }

  updateHourSelectors();
}

slider.addEventListener('input', () => setDate(parseInt(slider.value)));

// Play/Pause
const playBtn = document.getElementById('play-btn');
let lastPlayTime = 0;
function playLoop(now) {
  if (!playing) return;
  if (now - lastPlayTime >= 200) {
    lastPlayTime = now;
    let idx = parseInt(slider.value) + 1;
    if (idx > 76) idx = 0;
    setDate(idx);
  }
  playTimer = requestAnimationFrame(playLoop);
}
function togglePlay() {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) {
    lastPlayTime = performance.now();
    playTimer = requestAnimationFrame(playLoop);
  } else if (playTimer) {
    cancelAnimationFrame(playTimer);
    playTimer = null;
  }
}
playBtn.addEventListener('click', togglePlay);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') setDate(Math.min(76, parseInt(slider.value) + 1));
  if (e.code === 'ArrowLeft') setDate(Math.max(0, parseInt(slider.value) - 1));
});

// ---- Storm markers ----
function renderStormMarkers() {
  const el = document.getElementById('storm-markers');
  for (const s of storms) {
    const idx = dates.indexOf(s.date);
    if (idx < 0) continue;
    const pct = (idx / 76) * 100;
    const mark = document.createElement('div');
    mark.className = 'storm-mark';
    mark.style.left = `calc(${pct}% + 46px)`;
    mark.style.color = s.color;
    mark.style.borderColor = s.color + '44';
    mark.textContent = s.name;
    el.appendChild(mark);
  }
}

// ---- Wire toggles ----
function wireToggles() {
  const map = {
    't-sm': 'sm', 't-pr': 'pr', 't-satir': 'satir', 't-mslpf': 'mslpf',
    't-mslp': 'mslp', 't-lh': 'lh',
    't-rivers': 'rivers', 't-discharge': 'discharge', 't-lightning': 'lightning',
    't-arcs': 'arcs', 't-wind': 'wind', 't-wp': 'wp',
  };
  for (const [elId, key] of Object.entries(map)) {
    const el = document.getElementById(elId);
    if (!el) continue;
    el.checked = vis[key];
    el.addEventListener('change', () => {
      vis[key] = el.checked;
      syncVisibility();
    });
  }
}

// ---- Camera buttons ----
function wireCameraButtons() {
  document.querySelectorAll('.cam-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const [lng, lat] = btn.dataset.center.split(',').map(Number);
      const zoom = parseFloat(btn.dataset.zoom);
      mapInstance.flyTo({ center: [lng, lat], zoom, duration: 2000, essential: true });
    });
  });
}

// ---- Init ----
async function init() {
  // Start loading geotiff.js immediately (parallel with vector data)
  const geotiffReady = ensureGeoTIFF();
  const vectorData = await loadVectorData();
  await geotiffReady;

  mapInstance = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-8.0, 39.5],
    zoom: 6.5,
    minZoom: 3,
    maxZoom: 14,
  });

  mapInstance.on('style.load', async () => {
    addNativeLayers(mapInstance, vectorData);

    deckOverlay = new MapboxOverlay({ interleaved: true, layers: buildDeckLayers() });
    mapInstance.addControl(deckOverlay);

    wireToggles();
    wireCameraButtons();
    wireColormapSelector();
    wireSatirHourSlider();
    wireMslpHourButtons();
    wireWindDensity();
    renderStormMarkers();

    // Load first raster frame (soil moisture is checked by default)
    await loadRasterForDate('sm', dates[0]);
    setDate(0);

    document.getElementById('loading').classList.add('hidden');
  });
}

init().catch(err => {
  console.error('Init failed:', err);
  document.getElementById('loading').textContent = 'Error: ' + err.message;
});
</script>
