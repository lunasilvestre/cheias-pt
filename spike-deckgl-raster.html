<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike: deck.gl-raster COG Test (Local Build)</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: monospace; }
    #map { width: 100vw; height: 100vh; }

    #controls {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: rgba(12,12,20,0.9); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 14px; min-width: 280px; font-size: 13px;
    }
    h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
    .btn-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    button {
      background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-family: monospace;
    }
    button:hover { background: rgba(255,255,255,0.15); }
    button.active { background: rgba(52,152,219,0.3); border-color: #3498db; color: #fff; }
    button.active-green { background: rgba(46,204,113,0.3); border-color: #2ecc71; color: #fff; }
    .mode-label { font-size: 10px; color: #888; margin-bottom: 4px; }
    #log {
      position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px; max-height: 220px; overflow-y: auto;
      font-size: 11px; line-height: 1.5;
    }
    .log-ok { color: #2ecc71; }
    .log-err { color: #e74c3c; }
    .log-warn { color: #f39c12; }
    .log-info { color: #999; }
    #status {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(12,12,20,0.9); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 10px 14px; font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="status">Loading bundle...</div>

  <div id="controls">
    <h3>Render Mode</h3>
    <div class="btn-row">
      <button id="btn-mode-cog" class="active-green" onclick="setMode('coglayer')">COGLayer (bundle)</button>
      <button id="btn-mode-fallback" onclick="setMode('fallback')">BitmapLayer (fallback)</button>
    </div>

    <h3>Test 1 — Basic COG Render</h3>
    <div class="btn-row">
      <button id="btn-precip" onclick="loadCOG('precip')">Precipitation</button>
      <button id="btn-mslp" onclick="loadCOG('mslp')">MSLP</button>
      <button id="btn-satir" onclick="loadCOG('satir')">Satellite IR</button>
      <button id="btn-rgba" onclick="loadCOG('rgba')">rgba (local)</button>
    </div>

    <h3>Test 2 — Temporal Switching</h3>
    <div class="btn-row" id="temporal-btns">
      <button onclick="switchDate(0)">Jan 27</button>
      <button onclick="switchDate(1)">Jan 28</button>
      <button onclick="switchDate(2)">Feb 05</button>
    </div>

    <h3>Test 5 — Mixed Architecture</h3>
    <div class="btn-row">
      <button id="btn-vectors" onclick="toggleVectors()">Toggle MapLibre Vectors</button>
    </div>
  </div>

  <div id="log"></div>

  <script type="module">
    // ── Import from local esbuild bundle ──
    import { MapboxOverlay, COGLayer, BitmapLayer, proj4 } from './spike-deckgl-bundle.js';

    // ── Logging ──
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');

    function log(msg, cls = 'log-info') {
      const t = performance.now().toFixed(0);
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = `[${t}ms] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[${cls}] ${msg}`);
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    log('Bundle imported successfully', 'log-ok');
    log(`COGLayer: ${typeof COGLayer}`, 'log-info');
    log(`MapboxOverlay: ${typeof MapboxOverlay}`, 'log-info');
    log(`BitmapLayer: ${typeof BitmapLayer}`, 'log-info');

    // ── R2 base URL ──
    const R2 = 'https://pub-abad2527698d4bbab82318691c9b07a1.r2.dev/cog';

    // ── COG URLs ──
    // Float32 originals on R2 (for fallback BitmapLayer path)
    // rgba pre-scaled local test file (for COGLayer path)
    const COGS = {
      precip: [
        `${R2}/precipitation/2026-01-27.tif`,
        `${R2}/precipitation/2026-01-28.tif`,
        `${R2}/precipitation/2026-02-05.tif`,
      ],
      mslp: [
        `${R2}/mslp/2026-01-27T12.tif`,
        `${R2}/mslp/2026-01-28T12.tif`,
        `${R2}/mslp/2026-02-05T12.tif`,
      ],
      satir: [
        `${R2}/satellite-ir/2026-01-27T12-00.tif`,
        `${R2}/satellite-ir/2026-01-28T12-00.tif`,
      ],
      // RGBA test COG (on R2, for COGLayer — colormap pre-baked)
      rgba: [
        `${R2}/test/precip-rgba.tif`,
      ],
    };

    // ── State ──
    let map, deckOverlay;
    let currentType = null;
    let currentDateIdx = 0;
    let vectorsVisible = false;
    let renderMode = 'coglayer'; // 'coglayer' or 'fallback'
    let geotiffLib = null;

    // ── Colormaps (for fallback mode) ──
    const VIRIDIS_STOPS = [
      [68, 1, 84], [72, 33, 115], [67, 62, 133], [56, 88, 140],
      [45, 112, 142], [37, 133, 142], [30, 155, 138], [42, 176, 127],
      [81, 197, 105], [134, 213, 73], [194, 223, 35], [253, 231, 37],
    ];

    function viridisLUT(t) {
      t = Math.max(0, Math.min(1, t));
      const idx = t * (VIRIDIS_STOPS.length - 1);
      const lo = Math.floor(idx);
      const hi = Math.min(lo + 1, VIRIDIS_STOPS.length - 1);
      const f = idx - lo;
      return [
        Math.round(VIRIDIS_STOPS[lo][0] * (1 - f) + VIRIDIS_STOPS[hi][0] * f),
        Math.round(VIRIDIS_STOPS[lo][1] * (1 - f) + VIRIDIS_STOPS[hi][1] * f),
        Math.round(VIRIDIS_STOPS[lo][2] * (1 - f) + VIRIDIS_STOPS[hi][2] * f),
      ];
    }

    const BLUES_STOPS = [
      [8, 29, 88], [37, 52, 148], [34, 94, 168], [29, 145, 192],
      [65, 182, 196], [127, 205, 187], [199, 233, 180], [237, 248, 177],
    ];

    function bluesLUT(t) {
      t = Math.max(0, Math.min(1, t));
      const idx = t * (BLUES_STOPS.length - 1);
      const lo = Math.floor(idx);
      const hi = Math.min(lo + 1, BLUES_STOPS.length - 1);
      const f = idx - lo;
      return [
        Math.round(BLUES_STOPS[lo][0] * (1 - f) + BLUES_STOPS[hi][0] * f),
        Math.round(BLUES_STOPS[lo][1] * (1 - f) + BLUES_STOPS[hi][1] * f),
        Math.round(BLUES_STOPS[lo][2] * (1 - f) + BLUES_STOPS[hi][2] * f),
      ];
    }

    const IR_STOPS = [
      [20, 20, 20], [40, 40, 80], [60, 60, 150], [100, 60, 180],
      [180, 40, 120], [220, 80, 40], [250, 160, 0], [255, 255, 100],
    ];

    function irLUT(t) {
      t = Math.max(0, Math.min(1, t));
      const idx = t * (IR_STOPS.length - 1);
      const lo = Math.floor(idx);
      const hi = Math.min(lo + 1, IR_STOPS.length - 1);
      const f = idx - lo;
      return [
        Math.round(IR_STOPS[lo][0] * (1 - f) + IR_STOPS[hi][0] * f),
        Math.round(IR_STOPS[lo][1] * (1 - f) + IR_STOPS[hi][1] * f),
        Math.round(IR_STOPS[lo][2] * (1 - f) + IR_STOPS[hi][2] * f),
      ];
    }

    const CONFIG = {
      precip: { colormap: viridisLUT, rescale: null, label: 'Precipitation (mm)' },
      mslp:   { colormap: bluesLUT,   rescale: null, label: 'MSLP (Pa)' },
      satir:  { colormap: irLUT,      rescale: null, label: 'Satellite IR (BT)' },
      rgba:  { colormap: viridisLUT, rescale: null, label: 'Precip rgba (COGLayer)' },
    };

    // ── Mode switching ──
    window.setMode = function(mode) {
      renderMode = mode;
      document.getElementById('btn-mode-cog').className = mode === 'coglayer' ? 'active-green' : '';
      document.getElementById('btn-mode-fallback').className = mode === 'fallback' ? 'active-green' : '';
      log(`Render mode: ${mode}`, 'log-info');

      // Lazy-load geotiff.js for fallback mode
      if (mode === 'fallback' && !geotiffLib) {
        loadGeotiffLib();
      }
    };

    async function loadGeotiffLib() {
      try {
        log('Loading geotiff.js from esm.sh...', 'log-info');
        const mod = await import('https://esm.sh/geotiff@2.1.3');
        geotiffLib = mod;
        log('geotiff.js loaded', 'log-ok');
      } catch (err) {
        log(`geotiff.js load failed: ${err.message}`, 'log-err');
      }
    }

    // ── Map init ──
    map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center: [-8.0, 39.5],
      zoom: 6,
      minZoom: 3,
      maxZoom: 14,
    });

    map.on('load', () => {
      log('MapLibre loaded', 'log-ok');

      // deck.gl overlay from bundle
      deckOverlay = new MapboxOverlay({
        interleaved: true,
        layers: [],
      });
      map.addControl(deckOverlay);
      log('MapboxOverlay attached (from bundle)', 'log-ok');

      // Vector sources for Test 5
      map.addSource('basins', { type: 'geojson', data: 'assets/basins.geojson' });
      map.addLayer({
        id: 'basins-outline', type: 'line', source: 'basins',
        paint: { 'line-color': '#3498db', 'line-width': 1.5, 'line-opacity': 0 },
      });

      map.addSource('districts', { type: 'geojson', data: 'assets/districts.geojson' });
      map.addLayer({
        id: 'districts-outline', type: 'line', source: 'districts',
        paint: { 'line-color': '#666', 'line-width': 0.8, 'line-opacity': 0 },
      });

      log('Vector sources added (hidden)', 'log-info');
      setStatus('Ready — COGLayer (local build)');
    });

    // ── Custom geoKeysParser — bypasses epsg.io PROJJSON fetch ──
    // The default parser fetches from epsg.io which returns PROJJSON that
    // bundled proj4 can't parse (ellipsoid name mismatch). Instead, we
    // resolve EPSG codes to proj4 strings directly.
    const EPSG_DEFS = {
      4326: '+proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs',
      3857: '+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs',
    };

    async function customGeoKeysParser(geoKeys) {
      const code = geoKeys.ProjectedCSTypeGeoKey || geoKeys.GeographicTypeGeoKey || null;
      log(`GeoKeys: code=${code}, keys=${JSON.stringify(geoKeys)}`, 'log-info');

      if (!code) return null;

      const defStr = EPSG_DEFS[code];
      if (!defStr) {
        // Fallback: try epsg.io for unknown codes
        log(`Unknown EPSG:${code}, fetching from epsg.io...`, 'log-warn');
        const resp = await fetch(`https://epsg.io/${code}.proj4`);
        if (!resp.ok) throw new Error(`Failed to fetch EPSG:${code}`);
        const projStr = (await resp.text()).trim();
        log(`Fetched proj4 for EPSG:${code}: ${projStr}`, 'log-info');
        const key = `__spike_${code}__`;
        proj4.defs(key, projStr);
        return { def: projStr, parsed: proj4.defs(key), coordinatesUnits: 'degree' };
      }

      const key = `__spike_${code}__`;
      proj4.defs(key, defStr);
      const parsed = proj4.defs(key);
      const units = code === 4326 ? 'degree' : 'metre';
      log(`Resolved EPSG:${code} via local def (${units}), ellps=${parsed.ellps}`, 'log-ok');
      log(`parsed keys: ${Object.keys(parsed).join(',')}`, 'log-info');
      return { def: defStr, parsed, coordinatesUnits: units };
    }

    // ── COGLayer path (from bundle) ──
    function makeCOGLayer(id, url) {
      return new COGLayer({
        id: id,
        geotiff: url,
        opacity: 0.75,
        geoKeysParser: customGeoKeysParser,
      });
    }

    // ── BitmapLayer fallback path ──
    async function renderCOGToCanvas(url, colormapFn, rescale) {
      const t0 = performance.now();
      log(`Fetching COG: ${url.split('/').slice(-2).join('/')}`, 'log-info');

      const tiff = await geotiffLib.fromUrl(url);
      const image = await tiff.getImage();
      const width = image.getWidth();
      const height = image.getHeight();
      const bbox = image.getBoundingBox();
      const data = await image.readRasters({ samples: [0] });
      const band = data[0];

      const t1 = performance.now();
      log(`COG fetched: ${width}x${height}, bbox=[${bbox.map(v => v.toFixed(2)).join(',')}], ${(t1 - t0).toFixed(0)}ms`, 'log-ok');

      let [dMin, dMax] = rescale || [Infinity, -Infinity];
      if (!rescale) {
        for (let i = 0; i < band.length; i++) {
          const v = band[i];
          if (!isNaN(v) && isFinite(v)) {
            if (v < dMin) dMin = v;
            if (v > dMax) dMax = v;
          }
        }
        log(`Data range: ${dMin.toFixed(2)} - ${dMax.toFixed(2)}`, 'log-info');
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(width, height);

      const range = dMax - dMin || 1;
      for (let i = 0; i < band.length; i++) {
        const v = band[i];
        const px = i * 4;
        if (isNaN(v) || !isFinite(v)) {
          imgData.data[px + 3] = 0;
        } else {
          const t = (v - dMin) / range;
          const [r, g, b] = colormapFn(t);
          imgData.data[px] = r;
          imgData.data[px + 1] = g;
          imgData.data[px + 2] = b;
          imgData.data[px + 3] = 200;
        }
      }
      ctx.putImageData(imgData, 0, 0);

      const t2 = performance.now();
      log(`Canvas rendered: ${(t2 - t1).toFixed(0)}ms, total: ${(t2 - t0).toFixed(0)}ms`, 'log-ok');

      return { canvas, bounds: bbox };
    }

    // ── Load COG ──
    window.loadCOG = async function(type) {
      currentType = type;
      currentDateIdx = 0;

      document.querySelectorAll('#controls .btn-row:nth-of-type(2) button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${type}`).classList.add('active');

      const url = COGS[type][0];
      if (!url) { log(`No URL for ${type}`, 'log-err'); return; }

      setStatus(`Loading ${CONFIG[type].label}...`);

      if (renderMode === 'coglayer') {
        try {
          const t0 = performance.now();
          const layer = makeCOGLayer(`cog-${type}`, url);
          deckOverlay.setProps({ layers: [layer] });
          const elapsed = performance.now() - t0;
          log(`COGLayer created: ${elapsed.toFixed(0)}ms to setProps`, 'log-ok');
          setStatus(`${CONFIG[type].label} — COGLayer`);
        } catch (err) {
          log(`COGLayer error: ${err.message}`, 'log-err');
          log(`Stack: ${err.stack?.split('\n').slice(0, 5).join(' | ')}`, 'log-err');
        }
      } else {
        if (!geotiffLib) {
          log('geotiff.js not loaded yet — loading...', 'log-warn');
          await loadGeotiffLib();
        }
        try {
          const { canvas, bounds } = await renderCOGToCanvas(url, CONFIG[type].colormap, CONFIG[type].rescale);
          const layer = new BitmapLayer({
            id: `bmp-${type}`, image: canvas,
            bounds: [bounds[0], bounds[1], bounds[2], bounds[3]],
            opacity: 0.75, pickable: false,
          });
          deckOverlay.setProps({ layers: [layer] });
          log('BitmapLayer rendered via fallback', 'log-ok');
          setStatus(`${CONFIG[type].label} — BitmapLayer`);
        } catch (err) {
          log(`Fallback error: ${err.message}`, 'log-err');
        }
      }
    };

    // ── Temporal switching ──
    window.switchDate = async function(idx) {
      if (!currentType) { log('Load a COG type first', 'log-warn'); return; }
      const urls = COGS[currentType];
      if (idx >= urls.length) { log(`No URL for ${currentType} date ${idx}`, 'log-warn'); return; }

      currentDateIdx = idx;
      const url = urls[idx];
      const t0 = performance.now();

      document.querySelectorAll('#temporal-btns button').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });

      if (renderMode === 'coglayer') {
        try {
          const layer = makeCOGLayer(`cog-${currentType}-t${idx}`, url);
          deckOverlay.setProps({ layers: [layer] });
          const elapsed = performance.now() - t0;
          log(`Temporal switch (COGLayer) idx=${idx}: ${elapsed.toFixed(0)}ms to setProps`, 'log-ok');
        } catch (err) {
          log(`COGLayer temporal switch error: ${err.message}`, 'log-err');
        }
      } else {
        if (!geotiffLib) await loadGeotiffLib();
        try {
          const { canvas, bounds } = await renderCOGToCanvas(url, CONFIG[currentType].colormap, CONFIG[currentType].rescale);
          const layer = new BitmapLayer({
            id: `bmp-${currentType}-t${idx}`, image: canvas,
            bounds: [bounds[0], bounds[1], bounds[2], bounds[3]],
            opacity: 0.75, pickable: false,
          });
          deckOverlay.setProps({ layers: [layer] });
          const elapsed = performance.now() - t0;
          log(`Temporal switch (fallback): ${elapsed.toFixed(0)}ms total`, 'log-ok');
        } catch (err) {
          log(`Fallback temporal error: ${err.message}`, 'log-err');
        }
      }
    };

    // ── Toggle vectors ──
    window.toggleVectors = function() {
      vectorsVisible = !vectorsVisible;
      map.setPaintProperty('basins-outline', 'line-opacity', vectorsVisible ? 1 : 0);
      map.setPaintProperty('districts-outline', 'line-opacity', vectorsVisible ? 1 : 0);
      document.getElementById('btn-vectors').classList.toggle('active', vectorsVisible);
      log(`Vector layers: ${vectorsVisible ? 'VISIBLE' : 'hidden'}`, 'log-info');
      if (vectorsVisible) log('Test 5: deck.gl + MapLibre vectors coexist', 'log-ok');
    };

    // ── Error handlers ──
    window.addEventListener('error', (e) => log(`Error: ${e.message}`, 'log-err'));
    window.addEventListener('unhandledrejection', (e) => log(`Rejection: ${e.reason?.message || e.reason}`, 'log-err'));
  </script>
</body>
</html>
